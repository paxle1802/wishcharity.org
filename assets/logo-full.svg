  <style>
    .wish{font-family:'Fraunces','Playfair Display',Georgia,serif;font-weight:700;letter-spacing:.06em;fill:#1f3a5f}
    .tag{font-family:'Inter',sans-serif;font-weight:500;letter-spacing:.32em;fill:#5a7a9e;text-transform:uppercase}
  </style>
  <!-- Lantern mark on left -->
